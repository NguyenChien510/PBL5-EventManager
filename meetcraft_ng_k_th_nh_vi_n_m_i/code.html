<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | MeetCraft</title>
<!-- BEGIN: Tailwind CSS & Configuration -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandBlue: '#0077FF',
            brandPurple: '#8E2DE2',
          },
          backgroundImage: {
            'event-pattern': "url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&q=80&w=1920')",
          }
        }
      }
    }
  </script>
<!-- END: Tailwind CSS & Configuration -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="glassmorphism-effects">
    .glass-panel {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .glass-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(142, 45, 226, 0.5);
      box-shadow: 0 0 0 2px rgba(142, 45, 226, 0.2);
    }
    .gradient-text {
      background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand-gradient {
      background: linear-gradient(135deg, #4A90E2 0%, #8E2DE2 100%);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-slate-950 min-h-screen font-sans antialiased text-white flex items-center justify-center p-4">
<!-- BEGIN: Background Layer -->
<div class="fixed inset-0 z-[-1] opacity-40 bg-event-pattern bg-cover bg-center"></div>
<div class="fixed inset-0 z-[-2] bg-gradient-to-br from-brandBlue/20 to-brandPurple/20"></div>
<!-- END: Background Layer -->
<!-- BEGIN: Registration Container -->
<main class="w-full max-w-lg" data-purpose="registration-card-container">
<div class="glass-panel p-8 md:p-10 rounded-3xl shadow-2xl">
<!-- BEGIN: Header Section -->
<header class="text-center mb-8" data-purpose="form-header">
<h1 class="text-4xl font-extrabold tracking-tight mb-2">
          Create <span class="gradient-text">MeetCraft</span> Account
        </h1>
<p class="text-slate-300 text-sm">Join the community of makers and event enthusiasts.</p>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Registration Form -->
<form action="#" class="space-y-5" data-purpose="registration-form" method="POST">
<!-- Full Name Input -->
<div class="space-y-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1" for="full-name">Full Name</label>
<input class="glass-input w-full rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none" id="full-name" name="full-name" placeholder="John Doe" required="" type="text"/>
</div>
<!-- Email Input -->
<div class="space-y-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1" for="email">Email Address</label>
<input class="glass-input w-full rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none" id="email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
<!-- Password Inputs Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1" for="password">Password</label>
<input class="glass-input w-full rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="space-y-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1" for="confirm-password">Confirm</label>
<input class="glass-input w-full rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none" id="confirm-password" name="confirm-password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- User Type Toggle -->
<div class="space-y-2 py-2">
<span class="block text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1">I am an...</span>
<div class="flex items-center space-x-4">
<label class="flex items-center cursor-pointer group">
<input checked="" class="hidden peer" name="user-type" type="radio" value="attendee"/>
<div class="px-5 py-2 rounded-full border border-white/20 text-sm transition-all peer-checked:bg-white peer-checked:text-brandPurple peer-checked:border-white hover:border-white/50">
                Attendee
              </div>
</label>
<label class="flex items-center cursor-pointer group">
<input class="hidden peer" name="user-type" type="radio" value="organizer"/>
<div class="px-5 py-2 rounded-full border border-white/20 text-sm transition-all peer-checked:bg-white peer-checked:text-brandPurple peer-checked:border-white hover:border-white/50">
                Organizer
              </div>
</label>
</div>
</div>
<!-- Submit Button -->
<button class="brand-gradient w-full py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-brandPurple/30 transition-all active:scale-[0.98] mt-4" data-purpose="submit-button" type="submit">
          Join the Community
        </button>
</form>
<!-- END: Registration Form -->
<!-- BEGIN: Social Sign-up -->
<div class="mt-8" data-purpose="social-section">
<div class="relative flex items-center justify-center mb-6">
<div class="border-t border-white/10 w-full"></div>
<span class="absolute bg-[#1a1c2e] px-4 text-xs text-slate-400 uppercase tracking-widest">Or sign up with</span>
</div>
<div class="flex gap-4">
<button class="flex-1 glass-input py-3 rounded-xl flex items-center justify-center hover:bg-white/10 transition-all">
<svg class="w-5 h-5 mr-2" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex-1 glass-input py-3 rounded-xl flex items-center justify-center hover:bg-white/10 transition-all">
<svg class="w-5 h-5 mr-2 text-blue-500" fill="currentColor" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
<span class="text-sm font-medium">Facebook</span>
</button>
</div>
</div>
<!-- END: Social Sign-up -->
<!-- BEGIN: Footer Links -->
<footer class="mt-8 text-center" data-purpose="form-footer">
<p class="text-slate-400 text-sm">
          Already have an account? 
          <a class="text-brandBlue font-semibold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Login here</a>
</p>
</footer>
<!-- END: Footer Links -->
</div>
</main>
<!-- END: Registration Container -->
</body></html>
