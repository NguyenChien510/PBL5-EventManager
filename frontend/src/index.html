<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventPlatform - Hệ thống Sự kiện Đẳng cấp</title>
    <meta name="description" content="Nền tảng quản lý và bán vé sự kiện cao cấp hàng đầu Việt Nam" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1978e5",
              "electric": "#2e90fa",
              "background-light": "#f6f7f8",
              "background-dark": "#111821",
              "porcelain": "#ffffff",
              "cat-music": "#ec4899",
              "cat-tech": "#06b6d4",
              "cat-art": "#8b5cf6",
              "cat-sport": "#f97316",
              "cat-food": "#eab308",
              "success": "#10b981",
              "danger": "#ef4444",
              "accent-pink": "#f472b6",
              "accent-orange": "#fb923c",
              "surface": "#F8FAFC",
              "border-color": "#E2E8F0",
              "navy-deep": "#0f172a",
              "electric-blue": "#2563eb",
              "cat-purple": "#8b5cf6",
              "cat-cyan": "#06b6d4",
              "cat-green": "#22c55e",
              "cat-gold": "#eab308",
              "ocean-blue": "#0ea5e9",
              "warning": "#f59e0b",
              "conflict": "#ef4444",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"],
              "sans": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "2xl": "1.25rem",
              "3xl": "1.75rem",
              "full": "9999px"
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(25, 120, 229, 0.05)',
              'glow': '0 0 20px rgba(46, 144, 250, 0.35)',
              'minimal': '0 2px 12px rgba(0, 0, 0, 0.03)'
            }
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
      @layer components {
        /* User Profile page */
        .sidebar-link {
          @apply flex items-center gap-4 px-6 py-3.5 rounded-xl transition-all duration-200 text-slate-500 hover:bg-primary/5 hover:text-primary font-medium;
        }
        .sidebar-link.active {
          @apply bg-primary text-white shadow-lg shadow-primary/20 hover:bg-primary hover:text-white;
        }
        .section-card {
          @apply bg-white rounded-xl border border-slate-200/60 shadow-sm overflow-hidden;
        }
        .icon-3d-mini {
          @apply flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-primary/10 to-primary/5 text-primary shadow-inner;
        }
        .btn-primary {
          @apply px-6 py-2.5 bg-primary text-white font-semibold rounded-lg hover:bg-blue-600 transition-colors shadow-sm;
        }
        .btn-secondary {
          @apply px-6 py-2.5 border border-slate-200 text-slate-600 font-semibold rounded-lg hover:bg-slate-50 transition-colors;
        }
        
        /* Event Explore page */
        .glass-search {
          @apply backdrop-blur-xl bg-white/90 border border-slate-200/60 shadow-soft;
        }
        .filter-card {
          @apply bg-white border border-slate-100 rounded-2xl p-6 mb-4 shadow-minimal;
        }
        .category-item {
          @apply flex items-center gap-3 p-3 rounded-xl transition-all duration-300 cursor-pointer text-slate-500 font-medium;
        }
        .event-card {
          @apply bg-white rounded-[2rem] overflow-hidden border border-slate-100/80 transition-all duration-500 hover:shadow-2xl hover:shadow-primary/10 hover:-translate-y-1 flex flex-col h-full;
        }
        .btn-premium {
          @apply bg-gradient-to-br from-electric to-primary text-white shadow-glow hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center;
        }
        .cat-item-music:hover, .cat-item-music.active { @apply bg-pink-50 text-cat-music border border-pink-100; }
        .cat-item-tech:hover, .cat-item-tech.active { @apply bg-cyan-50 text-cat-tech border border-cyan-100; }
        .cat-item-art:hover, .cat-item-art.active { @apply bg-purple-50 text-cat-art border border-purple-100; }
        .cat-item-sport:hover, .cat-item-sport.active { @apply bg-orange-50 text-cat-sport border border-orange-100; }
        .cat-item-food:hover, .cat-item-food.active { @apply bg-yellow-50 text-cat-food border border-yellow-100; }
        
        /* Organizer Dashboard */
        .stat-card {
          @apply bg-white p-6 border border-border-color rounded-xl shadow-sm;
        }
        .progress-bar-container {
          @apply h-1.5 w-full bg-slate-100 rounded-full overflow-hidden;
        }
        .progress-fill-blue {
          @apply h-full bg-blue-600 rounded-full;
        }
        .progress-fill-green {
          @apply h-full bg-emerald-500 rounded-full;
        }
        .status-badge {
          @apply px-2.5 py-1 text-[11px] font-bold rounded-full uppercase tracking-wider;
        }
        
        /* Admin pages */
        .admin-sidebar-link {
          @apply flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200;
        }
        .admin-sidebar-link.active {
          @apply bg-primary text-white;
        }
        .approval-card {
          @apply bg-white border border-slate-200/60 rounded-xl shadow-sm;
        }
        
        /* Seat selection */
        .glass-card {
          @apply bg-white/80 backdrop-blur-md border border-white/20 shadow-xl;
        }
        .seat-item {
          @apply w-8 h-8 rounded text-[10px] font-bold flex items-center justify-center transition-all cursor-pointer;
        }
        .seat-item.available {
          @apply bg-slate-50 border border-slate-200 text-slate-600 hover:bg-primary/10 hover:border-primary hover:text-primary;
        }
        .seat-item.booked {
          @apply bg-slate-100 border border-slate-100 text-slate-300 cursor-not-allowed;
        }
        .seat-item.selected {
          @apply bg-primary text-white shadow-md shadow-primary/20;
        }
        .payment-method-card {
          @apply bg-slate-50 border border-slate-200 rounded-xl p-5 cursor-pointer transition-all hover:border-primary/30;
        }
        .payment-method-card.active {
          @apply border-primary bg-white shadow-lg shadow-primary/5;
        }
        
        /* Vouchers */
        .sidebar-item {
          @apply flex items-center gap-4 px-6 py-4 rounded-2xl transition-all duration-300 font-semibold text-slate-500 hover:bg-primary/5 hover:text-primary;
        }
        .sidebar-item.active {
          @apply bg-primary text-white shadow-lg shadow-primary/20 hover:bg-primary hover:text-white;
        }
        .voucher-card {
          @apply bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden relative transition-all hover:shadow-xl;
        }
        .bento-card {
          @apply bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden;
        }
        .section-title {
          @apply text-xl font-extrabold text-slate-900 flex items-center gap-3 mb-6;
        }
        .section-dot {
          @apply w-2 h-6 bg-primary rounded-full;
        }
        
        /* Event Detail */
        .glass-widget {
          @apply backdrop-blur-2xl bg-white/60 border border-white/40 shadow-[0_32px_64px_-15px_rgba(0,0,0,0.1)];
        }
        .timeline-dot {
          @apply w-10 h-10 rounded-xl flex items-center justify-center text-white shrink-0;
        }
        
        /* Admin sidebar */
        .admin-sidebar-item {
          @apply flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-100 transition-colors;
        }
        .admin-sidebar-item.active {
          @apply bg-primary/10 text-primary;
        }
        
        /* Config card */
        .config-card {
          @apply bg-white border border-slate-200 rounded-xl p-6 shadow-sm;
        }
        .input-field {
          @apply w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all;
        }

        /* Organizer HR / Roster Planner */
        .roster-card {
          @apply p-2 rounded-lg border-l-4 shadow-sm text-xs mb-1 cursor-move transition-all;
        }
        .roster-card:hover {
          filter: brightness(0.95);
        }
        .sidebar-icon-3d {
          filter: drop-shadow(0 4px 6px rgba(25, 121, 230, 0.2));
          transition: transform 0.2s;
        }
        .sidebar-item:hover .sidebar-icon-3d {
          transform: translateY(-2px) scale(1.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
          width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: #e2e8f0;
          border-radius: 10px;
        }
      }

      /* Calendar grid - must be outside @layer for specificity */
      .calendar-grid {
        display: grid;
        grid-template-columns: 120px repeat(7, 1fr);
      }

      /* Hero & Overlay gradients */
      .hero-gradient {
        background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.9) 100%);
      }
      .category-card-overlay {
        background: linear-gradient(to top, rgba(10,31,68,0.9) 0%, rgba(10,31,68,0.2) 60%, rgba(10,31,68,0.1) 100%);
      }

      /* Glass morphism */
      .glass-morphism {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Seat selection 3D */
      .seat-map-container {
        perspective: 1200px;
      }
      .seat-grid-3d {
        transform: rotateX(25deg);
        transform-style: preserve-3d;
      }

      /* Scan animation for check-in */
      @keyframes scan-move {
        0% { top: 0; }
        50% { top: calc(100% - 4px); }
        100% { top: 0; }
      }
      .scan-line {
        animation: scan-move 3s linear infinite;
      }

      /* Chart bars animation */
      .chart-bar {
        transition: height 0.3s ease;
      }

      /* Zigzag border for vouchers */
      .zigzag-border {
        position: relative;
        background-image: linear-gradient(135deg, transparent 75%, #ffffff 75%),
                          linear-gradient(225deg, transparent 75%, #ffffff 75%);
        background-position: 0 0, 0 0;
        background-size: 20px 20px;
        height: 10px;
        width: 100%;
        margin-top: -5px;
      }

      /* Filled Material icon variant */
      .filled-icon {
        font-variation-settings: 'FILL' 1;
      }
      .fill-1 {
        font-variation-settings: 'FILL' 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
